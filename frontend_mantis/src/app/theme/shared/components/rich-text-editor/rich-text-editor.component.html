<div class="rich-editor">
  <div class="rich-editor__toolbar">
    <button type="button" class="btn btn-light btn-sm" (click)="exec('formatBlock', 'p')">P</button>
    <button type="button" class="btn btn-light btn-sm" (click)="exec('formatBlock', 'h2')">H2</button>
    <button type="button" class="btn btn-light btn-sm" (click)="exec('formatBlock', 'h3')">H3</button>
    <button type="button" class="btn btn-light btn-sm" (click)="exec('bold')"><strong>B</strong></button>
    <button type="button" class="btn btn-light btn-sm" (click)="exec('italic')"><em>I</em></button>
    <button type="button" class="btn btn-light btn-sm" (click)="exec('underline')"><u>U</u></button>
    <button type="button" class="btn btn-light btn-sm" (click)="exec('insertUnorderedList')">Lista</button>
    <button type="button" class="btn btn-light btn-sm" (click)="exec('insertOrderedList')">1.</button>
    <button type="button" class="btn btn-light btn-sm" (click)="insertLink()">Link</button>
    <button type="button" class="btn btn-light btn-sm" (click)="insertTable()">Tabla</button>
    <button type="button" class="btn btn-light btn-sm" (click)="exec('removeFormat')">Limpiar</button>
  </div>

  <div
    #editor
    class="rich-editor__surface"
    contenteditable="true"
    [attr.data-placeholder]="placeholder"
    [style.minHeight.px]="minHeight"
    (input)="onInput()"
    (blur)="onBlur()"
    (paste)="onPaste($event)"
  ></div>
</div>
