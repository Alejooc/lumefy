<!-- Vertical layout -->
<ng-scrollbar style="height: calc(100vh - 49px)" visibility="hover" id="nav-ps-mantis">
  <div class="navbar-content">
    <ul class="nav coded-inner-navbar" (click)="fireOutClick()" (mouseleave)="navMob()">
      @for (item of navigations; track item.id) {
        <app-nav-group [item]="item"></app-nav-group>
      }
    </ul>
    @if (currentCompany) {
    <div class="m-4 mb-0">
      <div class="card nav-card">
        <div class="card-body">
          <div class="d-flex flex-column align-items-center">
            <div class="avatar avatar-l bg-light-primary text-primary">
              <i class="ti ti-building-store fs-3"></i>
            </div>
            <div class="m-t-20 text-center">
              <h5 class="mb-0">{{ currentCompany.name }}</h5>
              <span class="text-muted">Plan {{ currentCompany.plan || 'activo' }}</span>
            </div>
            <div class="m-t-20 text-center">
              <a routerLink="/billing" class="btn btn-primary text-white">
                Ver suscripción
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
    }
  </div>
</ng-scrollbar>
