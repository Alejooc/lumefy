services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: ${ROOT_ENV_FILE:-.env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/.env.production}
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'"
    volumes:
      - backend_static:/app/app/static
    networks:
      default: {}
      proxy:
        aliases:
          - lumefy-backend
          - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  outbox-relay:
    build: ./backend
    restart: unless-stopped
    command: python -m app.workers.outbox_relay
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/.env.production}
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on: [db, redis]

  operations-consumer:
    build: ./backend
    restart: unless-stopped
    command: python -m app.workers.operations_consumer
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/.env.production}
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on: [db, redis, outbox-relay]

  email-delivery-worker:
    build: ./backend
    restart: unless-stopped
    command: python -m app.workers.email_delivery_worker
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/.env.production}
    depends_on: [db, operations-consumer]

  frontend:
    build: ./frontend_mantis
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      default: {}
      proxy:
        aliases:
          - lumefy-frontend
          - frontend

  storefront:
    build:
      context: ./storefront_nextmerce
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        NEXT_PUBLIC_PLATFORM_STOREFRONT_DOMAIN: ${PLATFORM_STOREFRONT_DOMAIN}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_PLATFORM_STOREFRONT_DOMAIN: ${PLATFORM_STOREFRONT_DOMAIN}
      INTERNAL_API_URL: http://backend:8000/api/v1
      NEXT_IMAGE_ALLOW_LOCAL_IP: "false"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      default: {}
      proxy:
        aliases:
          - lumefy-storefront
          - storefront

  caddy:
    profiles: ["caddy"]
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      ADMIN_DOMAIN: ${ADMIN_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - backend_static:/var/www/static:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      storefront:
        condition: service_healthy

volumes:
  postgres_data:
    name: lumefy_postgres_data
  redis_data:
    name: lumefy_redis_data
  backend_static:
    name: lumefy_backend_static
  caddy_data:
    name: lumefy_caddy_data
  caddy_config:
    name: lumefy_caddy_config

networks:
  proxy:
    name: ${PROXY_NETWORK:-npm_default}
    external: true
