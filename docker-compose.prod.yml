services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: ${ROOT_ENV_FILE:-.env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/.env.production}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - backend_static:/app/app/static

  frontend:
    build: ./frontend_mantis
    restart: unless-stopped
    depends_on:
      - backend

  storefront:
    build:
      context: ./storefront_nextmerce
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_SITE_URL: ${STOREFRONT_URL}
      NEXT_PUBLIC_STOREFRONT_ID: ${STOREFRONT_ID:-}
      NEXT_PUBLIC_STOREFRONT_SUBDOMAIN: ${STOREFRONT_SUBDOMAIN:-}
      INTERNAL_API_URL: http://backend:8000/api/v1
      NEXT_IMAGE_ALLOW_LOCAL_IP: "false"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      ADMIN_DOMAIN: ${ADMIN_DOMAIN}
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - backend_static:/var/www/static:ro
    depends_on:
      - backend
      - frontend
      - storefront

volumes:
  postgres_data:
  backend_static:
