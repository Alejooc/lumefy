services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=lumefy_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lumefy_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/lumefy_db
      - POSTGRES_SERVER=db
    depends_on:
      - db
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 5

  storefront:
    build:
      context: ./storefront_nextmerce
      args:
        # This value is embedded in browser-side code during the Next build.
        # The API is exposed on the same host for local ecommerce testing.
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        # Browsers resolve tenant.localhost to loopback, matching production's
        # tenant.lumefy.shop behavior without editing the hosts file.
        NEXT_PUBLIC_PLATFORM_STOREFRONT_DOMAIN: localhost
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: http://backend:8000/api/v1
      NEXT_IMAGE_ALLOW_LOCAL_IP: "true"
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
